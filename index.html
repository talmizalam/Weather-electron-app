<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather_app</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jersey+25&family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
</head>
<body style="user-select: none;-webkit-app-region:drag;:-webkit-scrollbar{
    display: none;
}">
<img class="for_bg" src="https://i.pinimg.com/1200x/b0/19/2e/b0192e2e208e6cd7a390a1083b780f88.jpg" alt="">
<header>
    <!--THIS FOR HEADER OR TOP SECTION-->
    <div class="header">
        <h1>Weather App</h1>
        <img class="for_logo" src="images/download__12_-removebg-preview.png">
    </div>
</header>
<!--THIS FOR TEMPERATURE AND WEATHER DETAILS-->
<div class="for_tem">
    <h1 class="for_text_temp"></h1>
    <h2 class="for_text_temp_details"></h2>
</div>
<!--THIS FOR SEARCHING A CITY-->   
<div class="search">
    <input type="text" placeholder="Search for a city..." class="for_search">
    
</div>
<!--THIS FOR SHOWING THE CITY NAME-->
<div class="for_place">
    <h3 class="for_place_name">Enter your city</h3>
</div> 
<!--THIS FOR SHOWING THE WEATHER ICON-->  
<div  class="video">
    <video autoplay muted loop class="for_video">
        <source src="" type="video/webm">
    </video>
</div>
<script src="script.js"></script>
</body>
</html>
